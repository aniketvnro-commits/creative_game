<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creature Creator — Shape Game</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inconsolata:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* KEEP YOUR ORIGINAL CSS — only ADD this missing animation */

@keyframes confDrop {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<!-- KEEP YOUR FULL ORIGINAL HTML EXACTLY SAME -->
<!-- (No structural changes needed) -->

<script>

/* ================== DATA ================== */

const SHAPES = [
  { name: 'Circle', count: '× 3+',
    svg: `<circle cx="32" cy="32" r="26" fill="rgba(245,200,0,0.2)" stroke="#1a1a1a" stroke-width="2.5"/>` },

  { name: 'Triangle', count: '× 3+',
    svg: `<polygon points="32,6 58,58 6,58" fill="rgba(42,157,143,0.15)" stroke="#1a1a1a" stroke-width="2.5"/>` },

  { name: 'Square', count: '× 3+',
    svg: `<rect x="6" y="6" width="52" height="52" fill="rgba(232,93,4,0.15)" stroke="#1a1a1a" stroke-width="2.5"/>` },

  { name: 'Rectangle', count: '× 2+',
    svg: `<rect x="4" y="18" width="56" height="28" fill="rgba(231,111,81,0.15)" stroke="#1a1a1a" stroke-width="2.5"/>` },
];

const MISSIONS = [
  "Build a creature that lives in a city made entirely of paperwork",
  "Create a creature that feeds on unfinished meetings",
  "Design a creature that has evolved to survive funding cuts",
];

/* ================== STATE ================== */

let timerSecs = 600;
let timerRunning = false;
let timerInterval = null;
let currentShapes = [];
let currentMission = '';

let teams = [
  { name: 'Team A', pts: 0 },
  { name: 'Team B', pts: 0 }
];

/* ================== CORE ================== */

function pickRandom(arr, n) {
  const copy = [...arr];
  const out = [];
  for (let i = 0; i < n && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    out.push(copy.splice(idx, 1)[0]);
  }
  return out;
}

/* ================== SHAPES ================== */

function spinShapesOnly() {
  currentShapes = pickRandom(SHAPES, 3);
  renderShapes();
}

function renderShapes() {
  const el = document.getElementById('shapes-row');
  if (!el) return;

  let html = '';

  currentShapes.forEach((s, i) => {
    html += `
      <div class="shape-card">
        <svg viewBox="0 0 64 64">${s.svg}</svg>
        <div>${s.name}</div>
        <div>${s.count}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

/* ================== MISSION ================== */

function spinMissionOnly() {
  currentMission = MISSIONS[Math.floor(Math.random() * MISSIONS.length)];
  renderMission();
}

function renderMission() {
  const el = document.getElementById('mission-display');
  if (!el) return;

  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';

  el.textContent = currentMission;
}

/* ================== TIMER ================== */

function pad(n) { return n < 10 ? '0' + n : n; }

function updateTimerDisplay() {
  const el = document.getElementById('timer-num');
  if (!el) return;

  const m = Math.floor(timerSecs / 60);
  const s = timerSecs % 60;
  el.textContent = `${pad(m)}:${pad(s)}`;
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
  } else {
    clearInterval(timerInterval);
    timerRunning = true;

    timerInterval = setInterval(() => {
      if (timerSecs > 0) {
        timerSecs--;
        updateTimerDisplay();
      } else {
        clearInterval(timerInterval);
        timerRunning = false;
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSecs = 600;
  updateTimerDisplay();
}

/* ================== SCOREBOARD ================== */

function renderScoreboard() {
  const el = document.getElementById('score-body');
  if (!el) return;

  el.innerHTML = teams.map((t, i) => `
    <div>
      ${t.name} - ${t.pts}
      <button onclick="chScore(${i},1)">+</button>
      <button onclick="chScore(${i},-1)">-</button>
    </div>
  `).join('');
}

function chScore(i, d) {
  teams[i].pts = Math.max(0, teams[i].pts + d);
  renderScoreboard();
}

/* ================== CONFETTI ================== */

function burst() {
  const colors = ['#f5c800','#e85d04','#2a9d8f'];

  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'conf';

    el.style.cssText = `
      position:fixed;
      width:8px;height:8px;
      left:${Math.random()*100}%;
      top:${Math.random()*20}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation:confDrop 1.5s ease forwards;
    `;

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

/* ================== INIT ================== */

document.addEventListener('DOMContentLoaded', () => {
  updateTimerDisplay();
  renderScoreboard();
});

</script>

</body>
</html>
